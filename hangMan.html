<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="hangMan.css">
</head>

<body>
    <section class="container">
        <div class="backToPortfolio">
            <button class="back2"><a href="index.html">Back To Portfolio</a></button>
        </div>

        <div class="game-container">
            <h1>Hangman Game</h1>

            <div class="description">
                <strong>How to Play:</strong><br>
                Guess the hidden word one letter at a time. Each wrong guess adds a part to the hangman drawing.
                You have 6 wrong guesses before the game ends. Guess the full word before the drawing is complete to
                win!
            </div>

            <div id="hangman"></div>
            <div id="word-display"></div>

            <div class="keyboard" id="keyboard"></div>

            <div id="message"></div>

            <button id="restart">Restart Game</button>
            <button id="hint">Hint</button>
        </div>
    </section>


    <script src="javaScript.js"></script>
</body>

</html>
